<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Mô tả sách</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14171f;
    --ink-soft: #1f2430;
    --paper: #f3eee2;
    --paper-warm: #ece4d2;
    --gold: #c9982f;
    --rust: #a8452f;
    --text-on-ink: #ece7d9;
    --text-on-paper: #201d18;
    --text-muted: #6f6a5e;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--text-on-paper);
    line-height: 1.6;
  }

  h1, h2, h3, .display { font-family: 'Fraunces', serif; font-weight: 600; margin: 0; }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold);
  }
  a { color: inherit; }
  :focus-visible { outline: 3px solid var(--rust); outline-offset: 3px; }

  /* ---------- THANH QUAY LẠI ---------- */
  .back-bar {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid #e2d8c0;
  }
  .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    text-decoration: none;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .back-link:hover { color: var(--rust); }

  /* ---------- HERO ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 80vh;
  }
  .hero-cover {
    background: linear-gradient(160deg, var(--cover-a, var(--ink)) 0%, var(--cover-b, var(--ink-soft)) 100%);
    color: var(--text-on-ink);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 4rem 2.5rem; position: relative; overflow: hidden;
  }
  .hero-cover::after {
    content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 60px;
    background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.45) 100%); pointer-events: none;
  }
  .hero-monogram {
    position: absolute; top: -1rem; left: 50%; transform: translateX(-50%);
    font-family: 'Fraunces', serif; font-size: 14rem; font-weight: 600; line-height: 1;
    color: var(--cover-accent, var(--gold)); opacity: 0.1; pointer-events: none; user-select: none;
  }
  .hero-cover-icon {
    width: 72px; height: 72px;
    color: var(--cover-accent, var(--gold));
    opacity: 0.85;
    position: relative;
  }
  .hero-cover-icon svg { width: 100%; height: 100%; }
  .cover-genre {
    font-family: 'Space Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--cover-accent, var(--gold)); margin-bottom: 1.5rem;
    position: relative;
  }
  .cover-title { font-size: clamp(2.2rem, 5.5vw, 3.8rem); line-height: 1.05; max-width: 14ch; position: relative; }
  .cover-author { margin-top: 1.5rem; font-size: 1.05rem; opacity: 0.8; font-style: italic; position: relative; }
  .cover-rule { width: 48px; height: 2px; background: var(--cover-accent, var(--rust)); margin: 1.75rem 0; position: relative; }

  .hero-info {
    background: var(--paper);
    display: flex; flex-direction: column; justify-content: center;
    padding: 4rem 3.5rem; gap: 1rem;
  }
  .info-title {
    font-size: clamp(2rem, 4.2vw, 2.8rem);
    line-height: 1.1;
  }
  .info-author {
    font-size: 1.05rem;
    font-style: italic;
    color: var(--text-muted);
  }
  .info-genre-tag {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.78rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--cover-accent, var(--rust));
    border: 1px solid var(--cover-accent, var(--rust)); padding: 0.3rem 0.75rem;
    border-radius: 100px; width: fit-content; margin: 0.25rem 0 0.5rem;
  }
  .blurb { font-size: 1.08rem; max-width: 46ch; }
  .cta {
    display: inline-flex; align-items: center; gap: 0.6rem; width: fit-content;
    background: var(--rust); color: var(--paper); font-weight: 600; font-size: 1rem;
    padding: 0.9rem 1.8rem; border-radius: 3px; text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease; margin-top: 0.5rem;
  }
  .cta:hover { background: #8f3a26; transform: translateY(-2px); }
  .cta.disabled { background: #b9ac8f; cursor: not-allowed; pointer-events: none; }

  /* ---------- MÔ TẢ ---------- */
  section.body-section { padding: 5rem 3.5rem; }
  .section-inner { max-width: 780px; margin: 0 auto; }
  .section-heading { font-size: clamp(1.7rem, 3vw, 2.2rem); margin: 0.5rem 0 1.5rem; }
  .section-inner p { font-size: 1.08rem; }

  .not-found {
    min-height: 70vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; gap: 1rem; padding: 2rem;
  }
  .not-found h1 { font-size: 2rem; }
  .not-found a { color: var(--rust); font-weight: 600; }

  @media (max-width: 860px) {
    .hero { grid-template-columns: 1fr; min-height: auto; }
    .hero-cover { padding: 5rem 2rem 3rem; }
    .hero-cover::after { display: none; }
    .hero-info { padding: 3rem 2rem; }
    section.body-section { padding: 3rem 1.5rem; }
  }
</style>
</head>
<body>

  <div class="back-bar">
    <a class="back-link" href="index.html">← Quay lại thư viện</a>
  </div>

  <!-- Nội dung được JS sinh ra bên dưới, dựa trên ?id= trên URL -->
  <main id="pageContent"></main>

  <script>

      { id: "2", title: "Tales of an Old Salt", author: "Voldemar Miller", genre: "Truyện thiếu nhi",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "3", title: "The Laws of Human Nature", author: "Robert Greene", genre: "Tâm lý học",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "4", title: "Rooms", author: "Senbon Umishima", genre: "Nghệ thuật - Minh họa",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },

      { id: "6", title: "Chủ nghĩa khắc kỷ", author: "William B. Irvine", genre: "Triết học",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "7", title: "Đi giữa bấp bênh", author: "Thích Chân Quang", genre: "Tâm linh - Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "8", title: "Giao tiếp thông minh - nói đâu trúng đó", author: "Oxford", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "9", title: "Đừng lựa chọn an nhàn khi còn trẻ", author: "Cảnh Nhiên", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "10", title: "Điều kỳ diệu của tiệm tạp hóa Namiya", author: "Higashino Keigo", genre: "Tiểu thuyết",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "11", title: "Tôi là người hướng nội - dòng đời tĩnh lặng giữa thế gian ồn ào", author: "Sophia Dembling", genre: "Tâm lý học",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "12", title: "Bóng ma trên phố Ginza - những án mạng kì bí xứ phù tang", author: "Osaka Keikichi", genre: "Kinh dị - Trinh thám",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "13", title: "A diary of silent effort", author: "Lily Trương", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "14", title: "Chinh phục mục tiêu", author: "Brian Tracy", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "15", title: "Bí ẩn mãi mãi là bí ẩn", author: "nhiều tác giả", genre: "Trinh thám - Bí ẩn",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "16", title: "Tư duy phản biện", author: "Zoe Mckey", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "17", title: "Ticket to childhood", author: "Nguyễn Nhật Ánh", genre: "Tiểu thuyết",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "18", title: "Người nam châm", author: "Jack Canfield & D. D. Watkins", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "19", title: "Tiếng gọi nơi hoang dã", author: "Jack London", genre: "Tiểu thuyết",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "20", title: "Tâm lý học tiến hóa", author: "Dylan Evans & Oscar Zarate", genre: "Tâm lý học",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "21", title: "How to love", author: "Thích Nhất Hạnh", genre: "Tâm linh",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "22", title: "Đắc nhân tâm", author: "Dale Carnegie", genre: "Self help",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "23", title: "Bản CV hoàn hảo", author: "Jim Bright & Joanne Earl", genre: "Giáo dục - Kỹ năng nghề nghiệp",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "24", title: "Assassin's Creed - Brotherhood", author: "Oliver Bowden", genre: "Tiểu thuyết",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "25", title: "Chung một mái nhà 1", author: "Ghost Mikawa", genre: "Tình cảm",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "26", title: "Chung một mái nhà 2", author: "Ghost Mikawa", genre: "Tình cảm",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "27", title: "Chung một mái nhà 3", author: "Ghost Mikawa", genre: "Tình cảm",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "28", title: "Chung một mái nhà 4", author: "Ghost Mikawa", genre: "Tình cảm",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "29", title: "Chung một mái nhà 5", author: "Ghost Mikawa", genre: "Tình cảm",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "30", title: "Tự học tiếng anh cấp tốc", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "31", title: "Cân đối ngân sách", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "32", title: "Lời tình yêu - Love better - Love poetry", author: "", genre: "Tình cảm",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "33", title: "Tự học tiếng anh cấp tốc - cho người bắt đầu", author: "Huyền Windy", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "34", title: "Đầu tư thông minh", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "35", title: "Tập tành kinh doanh", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "36", title: "Hiểu đúng về tín dụng", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "37", title: "Tiết kiệm cho tương lai", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
      { id: "38", title: "Hiểu về thuế", author: "", genre: "Giáo dục",
        audience: "[Đối tượng đọc]", description: "[Mô tả]", buyLink: "#" },
    ];

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const book = books.find(b => b.id === id);
    const content = document.getElementById('pageContent');

    /* Bảng màu theo thể loại — giống hệt bên index.html để đồng bộ
       màu bìa giữa trang thư viện và trang mô tả */
    const coverThemes = [
      { match: ["kinh dị", "trinh thám", "bí ẩn"], colors: ["#3a1414", "#200a0a"], accent: "#d4785a",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8"/><path d="M12 8v5M12 16h.01"/></svg>` },
      { match: ["triết học", "tâm linh"], colors: ["#231a3d", "#140f24"], accent: "#c9a9e8",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18M6 8c0 3 2.5 4 6 4s6-1 6-4"/></svg>` },
      { match: ["tự thuyết", "tiểu thuyết"], colors: ["#122036", "#0b1524"], accent: "#7fb3c9",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5c4-2 8-2 8 0v14c0-2-4-2-8 0V5ZM20 5c-4-2-8-2-8 0v14c0-2 4-2 8 0V5Z"/></svg>` },
      { match: ["self help", "giáo dục", "kỹ năng"], colors: ["#1c2a1c", "#101a10"], accent: "#9bc98a",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"/><path d="M4 19a2 2 0 0 0 2 2h12M8 8h8M8 12h5"/></svg>` },
      { match: ["tâm lý", "nghệ thuật"], colors: ["#33210f", "#1e1309"], accent: "#e0ab6a",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>` },
      { match: ["tình cảm"], colors: ["#341a26", "#1f0f16"], accent: "#e08fa8",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20s-7-4.4-9.5-8.8C1 8 2.4 5 5.6 5c1.8 0 3.3 1 4.4 2.6C11.1 6 12.6 5 14.4 5 17.6 5 19 8 19 11.2 16.5 15.6 12 20 12 20Z"/></svg>` },
      { match: ["thiếu nhi"], colors: ["#332810", "#1e1709"], accent: "#f0c96a",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m12 3 2.4 5 5.6.6-4.2 3.8 1.2 5.5L12 15l-5 2.9 1.2-5.5L4 8.6l5.6-.6z"/></svg>` },
    ];
    const defaultTheme = { colors: ["#14171f", "#1f2430"], accent: "#c9982f",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"/><path d="M4 19a2 2 0 0 0 2 2h12"/></svg>` };
    function getTheme(genre) {
      const g = (genre || "").toLowerCase();
      return coverThemes.find(t => t.match.some(m => g.includes(m))) || defaultTheme;
    }

    if (!book) {
      content.innerHTML = `
        <div class="not-found">
          <h1 class="display">Không tìm thấy sách này</h1>
          <p>Link có thể chưa đúng, hoặc sách đã bị xoá khỏi danh sách.</p>
          <a href="index.html">← Quay lại thư viện</a>
        </div>`;
    } else {
      document.getElementById('pageTitle').textContent = book.title + " — " + book.author;

      const hasRealBuyLink = book.buyLink && book.buyLink !== "#";
      const buyBtn = hasRealBuyLink
        ? `<a class="cta" href="${book.buyLink}" target="_blank" rel="noopener">Mua sách ngay →</a>`
        : `<a class="cta disabled" href="javascript:void(0)" title="Chưa gán link mua sách">Mua sách ngay →</a>`;

      const theme = getTheme(book.genre);
      const coverStyle = `--cover-a:${theme.colors[0]}; --cover-b:${theme.colors[1]}; --cover-accent:${theme.accent};`;
      const monogram = (book.title || "?").trim().charAt(0).toUpperCase();

      content.innerHTML = `
        <header class="hero">
          <div class="hero-cover" style="${coverStyle}">
            <span class="hero-monogram">${monogram}</span>
            <span class="hero-cover-icon">${theme.icon || ""}</span>
          </div>
          <div class="hero-info">
            <h1 class="info-title">${book.title}</h1>
            <p class="info-author">của ${book.author}</p>
            <span class="info-genre-tag">${book.genre}</span>
            <p class="blurb">${book.description}</p>
            ${buyBtn}
          </div>
        </header>

        <section class="body-section">
          <div class="section-inner">
            <span class="eyebrow">Nội dung sách</span>
            <h2 class="section-heading">Về cuốn sách này</h2>
            <p>${book.description}</p>
          </div>
        </section>
      `;
    }
  </script>

</body>
</html>
